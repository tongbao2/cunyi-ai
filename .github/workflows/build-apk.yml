name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk
          export ANDROID_HOME=${{ runner.temp }}/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      
      - name: Setup Gradle Wrapper
        working-directory: ./android/CunYiAI
        run: |
          gradle wrapper --gradle-version=8.5
          chmod +x gradlew
      
      - name: Build Debug APK
        working-directory: ./android/CunYiAI
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cunyi-ai-debug.apk
          path: android/CunYiAI/build/outputs/apk/debug
          retention-days: 5
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          APK_PATH="android/CunYiAI/build/outputs/apk/debug/app-debug.apk"
          gh run download latest --dir . --pattern "**/app-debug.apk"
          FULL_APK=$(find . -name "app-debug.apk" -type f 2>/dev/null | head -1)
          if [ -f "$FULL_APK" ]; then
            echo "Found APK at: $FULL_APK"
            git tag -a v1.0.0 -m "Release v1.0.0"
            git push origin v1.0.0
            sleep 2
            gh release create v1.0.0 --title "CunYiAI v1.0.0" --notes "CunYiAI offline medical assistant APK" "$FULL_APK"
          else
            echo "APK not found"
            ls -la android/CunYiAI/build/outputs/apk/debug/
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
