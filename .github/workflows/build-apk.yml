name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk
          export ANDROID_HOME=${{ runner.temp }}/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Build Debug APK
        working-directory: ./android/CunYiAI
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build.log
          echo "=== DIAGNOSE ===" >> build.log
          find . -name "*.apk" >> build.log || echo "NO APK FOUND" >> build.log
          ls -la build/outputs/apk/debug/ >> build.log 2>&1 || echo "NO APK DIR" >> build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/CunYiAI/build.log
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cunyi-ai-debug-apk
          path: android/CunYiAI/build/outputs/apk/debug/
          if-no-files-found: warn
          retention-days: 30
