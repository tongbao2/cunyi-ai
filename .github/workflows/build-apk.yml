name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk
          export ANDROID_HOME=${{ runner.temp }}/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Setup Gradle Wrapper
        working-directory: ./android/CunYiAI
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/
          head -1 gradlew

      - name: Build Debug APK
        working-directory: ./android/CunYiAI
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log

      - name: Diagnose build output
        if: always()
        run: |
          echo "=== gradle build result ==="
          tail -30 build.log
          echo ""
          echo "=== APK files in android/CunYiAI/build ==="
          find android/CunYiAI/build -name "*.apk" -type f 2>/dev/null || echo "NONE"
          echo ""
          echo "=== build/outputs/apk dir ==="
          ls -laR android/CunYiAI/build/outputs/apk/ 2>/dev/null || echo "NO APK DIR"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/CunYiAI/build.log
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cunyi-ai-debug-apk
          path: |
            android/CunYiAI/build/outputs/apk/**/*.apk
            android/CunYiAI/build/**/*.apk
          if-no-files-found: warn
          retention-days: 30
