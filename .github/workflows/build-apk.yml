name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk
          export ANDROID_HOME=${{ runner.temp }}/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install Gradle
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip -d /opt
          ln -sf /opt/gradle-8.5/bin/gradle /usr/local/bin/gradle

      - name: Build Debug APK
        working-directory: ./android/CunYiAI
        run: |
          gradle clean assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Show build log
        if: always()
        working-directory: ./android/CunYiAI
        run: |
          echo "=== BUILD LOG TAIL (last 100 lines) ==="
          tail -100 build.log
          echo "=== APK CHECK ==="
          find . -name "*.apk" -type f || echo "NO APK FOUND"

      - name: Upload build output
        if: always()
        working-directory: ./android/CunYiAI
        uses: actions/upload-artifact@v4
        with:
          name: cunyi-ai-debug-apk
          path: build/outputs/apk/debug/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        if: always()
        working-directory: ./android/CunYiAI
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
